<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Assistant Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <!-- Chat Header with Title and Clear Button -->
        <div class="chat-header">
            <h2>Smart AI Assistant</h2>
            <button id="clear-btn" title="Clear Chat History">Clear Chat</button>
        </div>

        <!-- Chat Box where messages will dynamically appear -->
        <div class="chat-box" id="chat-box">
            <!-- Default welcome message -->
            <div class="message ai-message">Hello! I am your AI assistant. How can I help you today?</div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Fixed script tag tag to correctly load the JS file -->
    <script src="script.js"></script>
</body>
</html>
